<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1d2735,#3a4f69,#6d88a8);
    overflow:hidden;
    color:white;
}

.container{
    text-align:center;
    width:90%;
    max-width:1000px;
    z-index:2;
}

.title{
    font-family:'Playfair Display',serif;
    font-size:4rem;
    margin-bottom:10px;
}

.subtitle{
    font-size:1.8rem;
    margin-bottom:25px;
}

.countdown{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:20px;
}

.box{
    width:120px;
    height:120px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.2);
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.box h2{
    font-size:3rem;
}

.box span{
    font-size:0.9rem;
    letter-spacing:2px;
}

.message{
    margin-top:20px;
    font-size:1.1rem;
}

.gallery{
    display:none;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:30px;
}

.gallery img{
    width:200px;
    height:260px;
    object-fit:cover;
    border:10px solid white;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    transition:0.4s;
}

.gallery img:hover{
    transform:scale(1.05);
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:blink 2s infinite;
}

@keyframes blink{
    50%{
        opacity:.2;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1 class="title">Happy Birthday 🎂</h1>
    <h2 class="subtitle">27 Juni 2026</h2>

    <div class="countdown">

        <div class="box">
            <h2 id="days">00</h2>
            <span>HARI</span>
        </div>

        <div class="box">
            <h2 id="hours">00</h2>
            <span>JAM</span>
        </div>

        <div class="box">
            <h2 id="minutes">00</h2>
            <span>MENIT</span>
        </div>

        <div class="box">
            <h2 id="seconds">00</h2>
            <span>DETIK</span>
        </div>

    </div>

    <p class="message">✨ Menunggu hari spesial tiba ✨</p>

    <div class="gallery" id="gallery">
        <img src="c:\Users\User\Downloads\WhatsApp Image 2026-06-23 at 20.24.17 (2).jpeg" alt="">
        <img src="c:\Users\User\Downloads\WhatsApp Image 2026-06-23 at 20.24.17 (1).jpeg" alt="">
        <img src="c:\Users\User\Downloads\WhatsApp Image 2026-06-23 at 20.24.17.jpeg" alt="">
        <img src="c:\Users\User\Downloads\WhatsApp Image 2026-06-23 at 20.24.16.jpeg" alt="">
    </div>

</div>

<script>

const targetDate = new Date("2026-06-27T00:00:00");

function updateCountdown(){

    const now = new Date();
    const gap = targetDate - now;

    if(gap <= 0){

        document.querySelector(".countdown").style.display = "none";

        document.querySelector(".message").innerHTML =
        "🎉 Selamat Ulang Tahun 🎉";

        document.getElementById("gallery").style.display = "flex";

        return;
    }

    const days = Math.floor(gap / (1000*60*60*24));
    const hours = Math.floor((gap % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((gap % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((gap % (1000*60)) / 1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;
}

updateCountdown();
setInterval(updateCountdown,1000);

for(let i=0;i<120;i++){

    const star = document.createElement("div");
    star.classList.add("star");

    star.style.left = Math.random()*100 + "%";
    star.style.top = Math.random()*100 + "%";

    document.body.appendChild(star);
}

</script>

</body>
</html>
